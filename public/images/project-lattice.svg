<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lattice-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020408"/>
      <stop offset="100%" style="stop-color:#060C14"/>
    </linearGradient>
    <linearGradient id="edge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="node-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#lattice-bg)"/>

  <!-- Edges — network graph connections -->
  <g stroke="#1E3A5F" stroke-width="1" opacity="0.5">
    <!-- Cluster 1: left -->
    <line x1="160" y1="200" x2="280" y2="150"/>
    <line x1="160" y1="200" x2="240" y2="310"/>
    <line x1="280" y1="150" x2="400" y2="200"/>
    <line x1="280" y1="150" x2="360" y2="80"/>
    <line x1="240" y1="310" x2="400" y2="280"/>
    <line x1="240" y1="310" x2="200" y2="420"/>

    <!-- Cluster 2: center -->
    <line x1="520" y1="180" x2="640" y2="140"/>
    <line x1="520" y1="180" x2="600" y2="290"/>
    <line x1="640" y1="140" x2="760" y2="190"/>
    <line x1="600" y1="290" x2="720" y2="320"/>
    <line x1="760" y1="190" x2="720" y2="320"/>
    <line x1="600" y1="290" x2="560" y2="400"/>
    <line x1="720" y1="320" x2="680" y2="430"/>

    <!-- Cluster 3: right -->
    <line x1="900" y1="160" x2="1020" y2="200"/>
    <line x1="900" y1="160" x2="960" y2="280"/>
    <line x1="1020" y1="200" x2="1080" y2="320"/>
    <line x1="960" y1="280" x2="1080" y2="320"/>
    <line x1="960" y1="280" x2="920" y2="400"/>

    <!-- Cross-cluster edges (lighter) -->
    <line x1="400" y1="200" x2="520" y2="180" opacity="0.3"/>
    <line x1="400" y1="280" x2="520" y2="180" opacity="0.2"/>
    <line x1="760" y1="190" x2="900" y2="160" opacity="0.3"/>
    <line x1="720" y1="320" x2="900" y2="160" opacity="0.2"/>
  </g>

  <!-- Nodes — primary (bright) -->
  <g filter="url(#node-glow)">
    <!-- Cluster 1 nodes -->
    <circle cx="160" cy="200" r="5" fill="#3B82F6" opacity="0.9"/>
    <circle cx="280" cy="150" r="7" fill="#60A5FA" opacity="1"/>
    <circle cx="240" cy="310" r="5" fill="#3B82F6" opacity="0.9"/>
    <circle cx="400" cy="200" r="6" fill="#3B82F6" opacity="0.85"/>
    <circle cx="360" cy="80" r="4" fill="#93C5FD" opacity="0.7"/>
    <circle cx="200" cy="420" r="4" fill="#2563EB" opacity="0.7"/>

    <!-- Cluster 2 nodes — central, brightest -->
    <circle cx="520" cy="180" r="8" fill="#60A5FA" opacity="1"/>
    <circle cx="640" cy="140" r="10" fill="#93C5FD" opacity="1"/>
    <circle cx="600" cy="290" r="8" fill="#3B82F6" opacity="0.95"/>
    <circle cx="760" cy="190" r="7" fill="#60A5FA" opacity="0.9"/>
    <circle cx="720" cy="320" r="6" fill="#3B82F6" opacity="0.85"/>
    <circle cx="560" cy="400" r="5" fill="#2563EB" opacity="0.8"/>
    <circle cx="680" cy="430" r="5" fill="#2563EB" opacity="0.8"/>

    <!-- Cluster 3 nodes -->
    <circle cx="900" cy="160" r="7" fill="#60A5FA" opacity="0.9"/>
    <circle cx="1020" cy="200" r="5" fill="#3B82F6" opacity="0.85"/>
    <circle cx="960" cy="280" r="6" fill="#3B82F6" opacity="0.9"/>
    <circle cx="1080" cy="320" r="5" fill="#2563EB" opacity="0.8"/>
    <circle cx="920" cy="400" r="4" fill="#1D4ED8" opacity="0.7"/>
  </g>

  <!-- Type annotation labels on key nodes -->
  <text x="640" y="125" font-family="'Courier New', monospace" font-size="9" fill="#93C5FD" text-anchor="middle" opacity="0.7">RouteMap</text>
  <text x="520" y="168" font-family="'Courier New', monospace" font-size="9" fill="#60A5FA" text-anchor="middle" opacity="0.6">RequestBody</text>
  <text x="760" y="178" font-family="'Courier New', monospace" font-size="9" fill="#60A5FA" text-anchor="middle" opacity="0.6">Response&lt;T&gt;</text>
  <text x="280" y="138" font-family="'Courier New', monospace" font-size="9" fill="#60A5FA" text-anchor="middle" opacity="0.6">Params</text>
  <text x="900" y="148" font-family="'Courier New', monospace" font-size="9" fill="#60A5FA" text-anchor="middle" opacity="0.6">Schema</text>

  <!-- Title -->
  <text
    x="600"
    y="530"
    font-family="'Courier New', monospace"
    font-size="22"
    font-weight="700"
    fill="#E0F2FE"
    text-anchor="middle"
    letter-spacing="4"
  >LATTICE</text>
  <text
    x="600"
    y="558"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="#38BDF8"
    text-anchor="middle"
    letter-spacing="3"
    opacity="0.7"
  >TYPE-SAFE API LAYER · ZERO CODEGEN</text>
</svg>
