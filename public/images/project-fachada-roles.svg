<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Multi-role conceptual gradient: engineer (cool blue) → artist (warm amber) -->
    <linearGradient id="split-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#05070A"/>
      <stop offset="48%" style="stop-color:#0D0E10"/>
      <stop offset="52%" style="stop-color:#0E0C0A"/>
      <stop offset="100%" style="stop-color:#120A00"/>
    </linearGradient>
    <linearGradient id="engineer-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="artist-accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#EF4444"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#split-bg)"/>

  <!-- Subtle dividing line -->
  <line x1="600" y1="60" x2="600" y2="570" stroke="#2A2A2A" stroke-width="1" stroke-dasharray="6,6" opacity="0.5"/>

  <!-- Engineer side — left -->
  <!-- Circuit node pattern -->
  <g stroke="#1D4ED8" stroke-width="1" fill="none" opacity="0.3">
    <circle cx="120" cy="180" r="5" fill="#3B82F6" stroke="none" opacity="0.5"/>
    <circle cx="240" cy="280" r="5" fill="#3B82F6" stroke="none" opacity="0.5"/>
    <circle cx="180" cy="400" r="5" fill="#3B82F6" stroke="none" opacity="0.5"/>
    <circle cx="340" cy="200" r="5" fill="#3B82F6" stroke="none" opacity="0.5"/>
    <circle cx="420" cy="380" r="5" fill="#3B82F6" stroke="none" opacity="0.5"/>
    <circle cx="480" cy="250" r="5" fill="#3B82F6" stroke="none" opacity="0.5"/>
    <line x1="120" y1="180" x2="240" y2="280"/>
    <line x1="240" y1="280" x2="180" y2="400"/>
    <line x1="120" y1="180" x2="340" y2="200"/>
    <line x1="340" y1="200" x2="480" y2="250"/>
    <line x1="240" y1="280" x2="420" y2="380"/>
    <line x1="480" y1="250" x2="420" y2="380"/>
    <line x1="180" y1="400" x2="420" y2="380"/>
  </g>

  <!-- Engineer label -->
  <text x="300" y="120" font-family="'Courier New', monospace" font-size="11" fill="#3B82F6" text-anchor="middle" letter-spacing="4" opacity="0.9">ENGINEER</text>
  <!-- Engineer colored line -->
  <rect x="160" y="132" width="280" height="2" fill="url(#engineer-accent)" rx="1"/>

  <!-- Artist side — right -->
  <!-- Organic curves -->
  <g fill="none" stroke-width="1.5" opacity="0.3">
    <ellipse cx="900" cy="280" rx="160" ry="100" stroke="#F59E0B" transform="rotate(-20,900,280)"/>
    <ellipse cx="900" cy="300" rx="100" ry="160" stroke="#EF4444" transform="rotate(15,900,300)"/>
    <ellipse cx="880" cy="310" rx="130" ry="80" stroke="#F97316" transform="rotate(35,880,310)"/>
    <circle cx="840" cy="250" r="40" stroke="#F59E0B" opacity="0.4"/>
    <circle cx="960" cy="380" r="30" stroke="#EF4444" opacity="0.4"/>
  </g>

  <!-- Artist label -->
  <text x="900" y="120" font-family="Georgia, serif" font-size="11" fill="#F59E0B" text-anchor="middle" letter-spacing="4" opacity="0.9">ARTIST</text>
  <!-- Artist colored line -->
  <rect x="760" y="132" width="280" height="2" fill="url(#artist-accent)" rx="1"/>

  <!-- Central "&" connector -->
  <text x="600" y="330" font-family="Georgia, serif" font-size="48" font-weight="400" fill="#3A3A3A" text-anchor="middle" dominant-baseline="middle">&amp;</text>

  <!-- Bottom labels -->
  <text x="300" y="540" font-family="'Courier New', monospace" font-size="11" fill="#A8A89E" text-anchor="middle" letter-spacing="2">PRECISION · SYSTEMS · SCALE</text>
  <text x="900" y="540" font-family="Georgia, serif" font-size="12" fill="#A8A89E" text-anchor="middle" letter-spacing="1">Emergence · Intuition · Impermanence</text>
</svg>
