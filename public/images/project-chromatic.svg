<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rothko-inspired warm color field -->
    <linearGradient id="bg-field" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D0B47"/>
      <stop offset="30%" style="stop-color:#7B1D5C"/>
      <stop offset="60%" style="stop-color:#C4503A"/>
      <stop offset="85%" style="stop-color:#E8832A"/>
      <stop offset="100%" style="stop-color:#F4C261"/>
    </linearGradient>
    <linearGradient id="band1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#200838;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#4A0E6A;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#200838;stop-opacity:0.9"/>
    </linearGradient>
    <linearGradient id="band2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B1A52;stop-opacity:0.85"/>
      <stop offset="50%" style="stop-color:#C43060;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#8B1A52;stop-opacity:0.85"/>
    </linearGradient>
    <linearGradient id="band3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B54029;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#E0623A;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#B54029;stop-opacity:0.9"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12"/>
    </filter>
  </defs>

  <!-- Base color field -->
  <rect width="1200" height="630" fill="url(#bg-field)"/>

  <!-- Rothko color bands — soft horizontal fields bleeding into each other -->
  <rect x="0" y="0" width="1200" height="210" fill="url(#band1)" filter="url(#blur2)"/>
  <rect x="0" y="180" width="1200" height="230" fill="url(#band2)" filter="url(#blur2)"/>
  <rect x="0" y="380" width="1200" height="250" fill="url(#band3)" filter="url(#blur1)"/>

  <!-- Soft vignette edges -->
  <rect x="0" y="0" width="120" height="630" fill="black" opacity="0.25"/>
  <rect x="1080" y="0" width="120" height="630" fill="black" opacity="0.25"/>

  <!-- Grain texture suggestion (diagonal stripes very subtle) -->
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"
    style="stroke-dasharray: 1, 3"/>

  <!-- Title — minimal, in the lower third -->
  <text
    x="600"
    y="490"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="20"
    font-weight="400"
    fill="rgba(255,255,255,0.7)"
    text-anchor="middle"
    letter-spacing="6"
  >CHROMATIC DRIFT</text>

  <!-- Series notation -->
  <text
    x="600"
    y="520"
    font-family="'Courier New', monospace"
    font-size="11"
    fill="rgba(255,255,255,0.35)"
    text-anchor="middle"
    letter-spacing="3"
  >GENERATIVE SERIES · 48 PIECES · 2025</text>
</svg>
